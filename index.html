<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtiEmo · LLM 情绪演出引擎</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="stage">
    <header class="topbar">
      <span class="logo">ArtiEmo</span>
      <span class="subtitle">LLM 情绪演出引擎</span>
      <span class="mode-badge" id="modeBadge">演示模式</span>
      <button id="charBtn" class="ghost icon-btn" title="角色卡">🎭</button>
      <button id="saveBtn" class="ghost icon-btn" title="存档/读档">💾</button>
      <button id="newSessionBtn" class="ghost icon-btn" title="新会话">🆕</button>
      <button id="settingsBtn" class="ghost icon-btn" title="设置">⚙</button>
    </header>

    <main class="scene">
      <!-- 表情区：emoji + 标签双显示 -->
      <aside class="portrait" id="portrait">
        <div class="emoji" id="emoji">🙂</div>
        <div class="label" id="label">平静</div>
      </aside>

      <!-- 文字框：语言 + 动作混排 -->
      <section class="dialogue-box">
        <div class="char-name" id="charName">綾</div>
        <div class="textflow" id="textflow"></div>
        <div class="continue-hint" id="continueHint">▾</div>
      </section>
    </main>

    <!-- 对话输入区（实时模式用） -->
    <form class="chat-input" id="chatForm">
      <input
        type="text"
        id="userInput"
        placeholder="对她说点什么…（演示模式下点「播放演出」看样例）"
        autocomplete="off"
      />
      <button type="submit" id="sendBtn">发送</button>
    </form>

    <footer class="controls">
      <button id="playBtn" class="ghost">▶ 播放演示</button>
      <button id="skipBtn" class="ghost">跳过停顿</button>
      <label class="speed">
        速度
        <input type="range" id="speedRange" min="0.25" max="3" step="0.25" value="1" />
        <span id="speedVal">1.0x</span>
      </label>
      <span class="state-readout" id="stateReadout"></span>
    </footer>

    <!-- 调试台：显示 LLM 请求/原始输出/解析结果 -->
    <section class="debug-console" id="debugConsole">
      <div class="console-bar">
        <button class="ghost console-toggle" id="consoleToggle">▸ 调试台</button>
        <button class="ghost" id="clearConsole">清空</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </section>
  </div>

  <!-- 设置面板 -->
  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>设置 · BYOK</h2>
        <button class="ghost icon-btn" id="closeSettings">✕</button>
      </div>

      <p class="modal-note">
        ArtiEmo 是纯静态前端，<b>无后端</b>。你的 Key 只存在<b>本机浏览器</b>里，
        请求直接从浏览器打到你填的接口。建议用<b>临时/低额度</b> Key，或本地模型。
      </p>

      <div class="field">
        <label>接口地址 (OpenAI 兼容 baseURL)</label>
        <input type="text" id="cfgBaseURL" placeholder="https://api.openai.com/v1" />
        <small>填到 /v1 即可，会自动拼 /chat/completions。可填任意兼容网关或本地模型(LM Studio / Ollama)。</small>
      </div>

      <div class="field">
        <label>API Key</label>
        <input type="password" id="cfgApiKey" placeholder="sk-..." />
      </div>

      <div class="field">
        <label>模型</label>
        <input type="text" id="cfgModel" placeholder="gpt-4o-mini" />
      </div>

      <div class="field">
        <label>Temperature <span id="tempVal">0.9</span></label>
        <input type="range" id="cfgTemp" min="0" max="1.5" step="0.05" value="0.9" />
      </div>

      <div class="modal-actions">
        <button class="ghost" id="clearCfg">清除</button>
        <button id="saveCfg">保存</button>
      </div>
    </div>
  </div>

  <!-- 角色卡面板 -->
  <div class="modal-backdrop" id="charModal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>角色卡 🎭</h2>
        <button class="ghost icon-btn" id="closeChar">✕</button>
      </div>
      <p class="modal-note">切换角色会<b>开启新会话</b>，情绪回到该角色的初始状态。内置卡可编辑，自定义卡可删除。</p>
      <div class="card-list" id="cardList"></div>
      <div class="card-editor">
        <div class="editor-head">
          <span>编辑 / 新建</span>
          <button class="ghost mini" id="newCard">+ 新建空白卡</button>
        </div>
        <div class="card-form-row">
          <input type="text" id="cardEmoji" class="emoji-input" placeholder="🙂" maxlength="4" />
          <input type="text" id="cardName" placeholder="角色名" />
        </div>
        <textarea id="cardPersona" rows="3" placeholder="人物设定：性格、与你的关系…"></textarea>
        <textarea id="cardStyle" rows="2" placeholder="说话风格：句式、口头禅、停顿习惯…"></textarea>
        <div class="modal-actions">
          <button id="saveCard">保存这张卡</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 存档面板 -->
  <div class="modal-backdrop" id="saveModal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>存档 / 读档 💾</h2>
        <button class="ghost icon-btn" id="closeSave">✕</button>
      </div>
      <div class="save-new">
        <input type="text" id="saveName" placeholder="给当前对话起个名字（留空用时间）" />
        <button id="doSave">存档</button>
      </div>
      <div class="save-list" id="saveList"></div>
    </div>
  </div>

  <script src="prompts/beat-protocol.system.js"></script>
  <script src="data/character.js"></script>
  <script src="data/sample.js"></script>
  <script src="src/store.js"></script>
  <script src="src/llm.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
